name: Build APK

# Запускается автоматически при каждом push в ветку main,
# а также вручную через вкладку Actions -> Build APK -> Run workflow
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка системных зависимостей
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev

      - name: Установка Python-зависимостей
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Сборка APK
        run: |
          yes | buildozer -v android debug

      - name: Загрузить APK как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: screencast-apk
          path: bin/*.apk
